<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Mock Examination</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow-lg">

                <div class="card-header bg-primary text-white text-center p-4">

                    <h2>AWS Certified Cloud Practitioner</h2>
                    <h5 class="mb-0">Mock Examination</h5>

                </div>

                <div class="card-body p-5">

                    <div class="alert alert-info">
                        <strong>Student :</strong> {{ username }}
                    </div>

                    <form method="POST">

                        {% for question in exam.questions %}

                        {% set q_index = loop.index0 %}

                        <div class="card mb-4 shadow-sm">

                            <div class="card-body">

                                <h5 class="mb-4">
                                    Q{{ loop.index }}. {{ question.question }}
                                </h5>

                                {% for option in question.options %}

                                <div class="form-check mb-2">

                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        id="q{{ q_index }}_{{ loop.index0 }}"
                                        name="q{{ q_index }}"
                                        value="{{ option }}"
                                        required>

                                    <label class="form-check-label"
                                           for="q{{ q_index }}_{{ loop.index0 }}">

                                        {{ option }}

                                    </label>

                                </div>

                                {% endfor %}

                            </div>

                        </div>

                        {% endfor %}

                        <div class="text-center mt-5">

                            <button
                                type="submit"
                                class="btn btn-success btn-lg px-5">

                                Submit Examination

                            </button>

                        </div>

                        <div class="text-center mt-3">

                            <a href="{{ url_for('dashboard', username=username) }}"
                               class="btn btn-outline-secondary">

                                ← Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
